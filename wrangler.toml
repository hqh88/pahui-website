name = "pahui-website"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "dist/server/entry.mjs"

[assets]
directory = "dist/client"
binding = "ASSETS"

[vars]
# Non-secret env vars can go here
# Secret vars (KEYSTATIC_GITHUB_CLIENT_ID, etc.) should be set via:
# wrangler secret put KEYSTATIC_GITHUB_CLIENT_ID
# wrangler secret put KEYSTATIC_GITHUB_CLIENT_SECRET
# wrangler secret put KEYSTATIC_SECRET
